version: '3.8'

services:
  amazon-ads-mcp:
    image: openbridge/amazon-ads-mcp:latest  # Das richtige Image!
    container_name: amazon-ads-mcp
    ports:
      - "127.0.0.1:9080:9080"
    environment:
      - AMAZON_AD_API_CLIENT_ID=${AMAZON_AD_API_CLIENT_ID:-demo}
      - AMAZON_AD_API_CLIENT_SECRET=${AMAZON_AD_API_CLIENT_SECRET:-demo}
      - AUTH_METHOD=${AUTH_METHOD:-direct}
      - AMAZON_AD_API_PACKAGES=${AMAZON_AD_API_PACKAGES:-profiles,campaign-manage}
    restart: unless-stopped
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge
